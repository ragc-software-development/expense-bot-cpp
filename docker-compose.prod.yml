version: '3.8'

services:
  # The Discord Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense_bot_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # These variables must be set on the host machine or in CI/CD pipeline.
      # Docker Compose will pass them through to the container.
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - bot_network

  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: expense_bot_db_prod
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432" # Bind to localhost ONLY for security
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

volumes:
  prod_postgres_data:

networks:
  bot_network:
    driver: bridge
